<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Isometric SketchUp-style cube: three faces in Modus blues, navy stroke -->
  <!-- Top face -->
  <polygon points="110,32 192,72 110,112 28,72" fill="#DCEDF9" stroke="#0E416C" stroke-width="6" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="28,72 110,112 110,200 28,160" fill="#87C8EE" stroke="#0E416C" stroke-width="6" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="192,72 110,112 110,200 192,160" fill="#009AD9" stroke="#0E416C" stroke-width="6" stroke-linejoin="round"/>
  <!-- Red record circle, bottom-right -->
  <circle cx="200" cy="200" r="44" fill="#E11D1D" stroke="#7A0E0E" stroke-width="6"/>
</svg>
