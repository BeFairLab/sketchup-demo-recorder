<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SketchUp Demo Recorder</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>SketchUp Demo Recorder</h1>
    <div class="status">
      <span id="status-dot" class="dot idle"></span>
      <span id="status-text">idle</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="editor">Editor</button>
    <button class="tab-btn" data-tab="manage">Manage</button>
  </nav>

  <!-- ─── EDITOR TAB ────────────────────────────────────────── -->
  <div class="tab" data-tab="editor">

    <section class="card">
      <h2>Preset <span id="preset-active" class="muted">— none —</span></h2>
      <div class="row">
        <label>Library
          <select id="preset-select"></select>
        </label>
        <input id="preset-name" placeholder="preset-name">
        <button id="btn-preset-new">New</button>
        <button id="btn-preset-load">Load</button>
        <button id="btn-preset-save">Save</button>
        <button id="btn-preset-duplicate">Duplicate</button>
        <button id="btn-preset-apply">Apply to current timeline</button>
      </div>
    </section>

    <section class="card">
      <h2>Timeline <span id="timeline-active" class="muted">— none —</span></h2>
      <div class="row">
        <label>Library
          <select id="seq-select"></select>
        </label>
        <input id="seq-name" placeholder="timeline-name">
        <button id="btn-new">New</button>
        <button id="btn-load">Load</button>
        <button id="btn-save-timeline">Save timeline</button>
        <button id="btn-save-preset-to-seq">Save preset → timeline</button>
        <button id="btn-ping">Ping</button>
      </div>
      <div class="row">
        <span class="muted" id="timeline-preset-link"></span>
      </div>
    </section>

    <section class="card">
      <h2>Viewport</h2>
      <div class="row">
        <label><input type="radio" name="vp-mode" value="viewport" checked> Viewport (model area)</label>
        <label><input type="radio" name="vp-mode" value="window"> Window</label>
      </div>
      <div class="row">
        <label>Preset
          <select id="vp-preset">
            <option value="youtube_1080p"  data-w="1920" data-h="1080">YouTube 1920×1080</option>
            <option value="fhd_1_5x"       data-w="2880" data-h="1620">FHD 1.5× 2880×1620</option>
            <option value="youtube_4k"     data-w="3840" data-h="2160">YouTube 4K 3840×2160 (may not fit)</option>
            <option value="reels_1080p"    data-w="1080" data-h="1920">Reels/TikTok 1080×1920</option>
            <option value="reels_1_5x"     data-w="1620" data-h="2880">Reels 1.5× 1620×2880</option>
            <option value="square_1080"    data-w="1080" data-h="1080">Square 1080×1080</option>
            <option value="universal_2160" data-w="2160" data-h="2160">Universal Square 2160×2160</option>
            <option value="universal_2880" data-w="2880" data-h="2880">Universal Square 2880×2880</option>
            <option value="custom" data-w="" data-h="">Custom…</option>
          </select>
        </label>
        <label>W <input type="number" id="vp-w" value="1920" style="width:80px"></label>
        <label>H <input type="number" id="vp-h" value="1080" style="width:80px"></label>
        <button id="btn-apply-vp">Apply to SketchUp</button>
        <button id="btn-show-overlay">Show overlay</button>
        <button id="btn-hide-overlay">Hide</button>
      </div>
      <div id="vp-region" class="muted">region: not set</div>
      <div class="row">
        <label>Overlay shift X
          <input type="number" id="overlay-shift-x" value="0" step="1" style="width:70px">
        </label>
        <label>Y
          <input type="number" id="overlay-shift-y" value="0" step="1" style="width:70px">
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Recording</h2>
      <div class="row">
        <button id="btn-rec" class="primary">● Record clicks</button>
        <button id="btn-rec-continue">↻ Continue recording</button>
        <span class="muted">⌃⌥⌘R fresh · ⌃⌥⌘E continue</span>
        <span id="rec-events" class="muted">0 events</span>
      </div>
    </section>

    <section class="card">
      <h2>Playback</h2>
      <div class="row">
        <label><input type="checkbox" id="auto-path"> Auto-path (straight-line robot motion between clicks)</label>
        <label>Speed
          <input type="number" id="auto-path-pps" value="1000" min="100" max="8000" step="100" style="width:80px">
          <span class="muted">px/s</span>
        </label>
        <label>Easing
          <select id="auto-path-easing">
            <option value="in_out" selected>Ease in-out</option>
            <option value="out">Ease out</option>
            <option value="in">Ease in</option>
            <option value="linear">Linear</option>
          </select>
        </label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="click-effects"> Show click circles</label>
        <label><input type="checkbox" id="show-keystrokes"> Show keystrokes (English)</label>
      </div>
      <div class="row">
        <label>Pre-delay
          <input type="number" id="pre-delay-ms" value="1000" min="0" step="100" style="width:90px">
          <span class="muted">ms</span>
        </label>
        <label>Post-delay
          <input type="number" id="post-delay-ms" value="1000" min="0" step="100" style="width:90px">
          <span class="muted">ms</span>
        </label>
      </div>
      <div class="row">
        <button id="btn-apply-auto">Apply auto-path to timeline (strip moves)</button>
      </div>
    </section>

    <section class="card">
      <h2>Timeline events <span id="timeline-meta" class="muted"></span></h2>
      <div class="row">
        <button id="btn-play">▶ Play (no capture)</button>
        <button id="btn-capture" class="primary">⏺ Record + Replay</button>
        <span class="muted">⌃⌥⌘P play</span>
      </div>
      <div id="timeline" class="timeline"></div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <div class="row">
        <label><input type="checkbox" id="auto-crop-universal"> Auto-crop universal → YouTube + Reels mp4</label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="auto-rescale"> Rescale (non-universal)</label>
        <label>W <input type="number" id="rescale-w" value="1920" min="0" style="width:80px"></label>
        <label>H <input type="number" id="rescale-h" value="1080" min="0" style="width:80px"></label>
      </div>
      <div class="row">
        <span class="muted">Universal rescale per variant:</span>
        <label>YouTube W <input type="number" id="rescale-yt-w" value="1920" min="0" style="width:80px"></label>
        <label>H <input type="number" id="rescale-yt-h" value="1080" min="0" style="width:80px"></label>
        <label>Reels W <input type="number" id="rescale-rl-w" value="1080" min="0" style="width:80px"></label>
        <label>H <input type="number" id="rescale-rl-h" value="1920" min="0" style="width:80px"></label>
      </div>
    </section>

    <section class="card">
      <h2>Last output</h2>
      <div id="last-output" class="muted">—</div>
    </section>
  </div>

  <!-- ─── MANAGE TAB ────────────────────────────────────────── -->
  <div class="tab" data-tab="manage" hidden>
    <section class="card">
      <h2>Presets</h2>
      <div id="manage-presets" class="manage-list"></div>
    </section>
    <section class="card">
      <h2>Timelines</h2>
      <div id="manage-timelines" class="manage-list"></div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
